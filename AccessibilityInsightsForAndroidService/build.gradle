// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext.kotlin_version = '1.9.22'
    repositories {
        mavenCentral()
        google()
        gradlePluginPortal()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.0.1'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

plugins {
    id "com.diffplug.spotless" version "8.4.0"
}

allprojects {
    repositories {
        mavenCentral()
        google()
        gradlePluginPortal()
    }
}

spotless {
    java {
        googleJavaFormat()
        target '**/*.java'
        targetExclude '**/AccessibilityInsightsForAndroidService.java','**/AccessibilityNodeInfoSorter.java'
        licenseHeader '// Copyright (c) Microsoft Corporation.\n// Licensed under the MIT License.\n\n'
    }
    kotlin {
        ktlint()
        target '**/*.kt'
        licenseHeader '// Copyright (c) Microsoft Corporation.\n// Licensed under the MIT License.\n\n'
    }
}

task fastpass {
    dependsOn 'spotlessCheck'
    dependsOn 'app:lint'
}

task fastpassFix {
    gradle.startParameter.writeDependencyLocks = true
    dependsOn 'spotlessApply'
    dependsOn 'app:lintFix'
}

dependencyLocking {
    lockAllConfigurations()
}